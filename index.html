  if(frac<0.47) return 'Waxing Gibbous';
  if(frac<0.53) return 'Full Moon';
  if(frac<0.72) return 'Waning Gibbous';
  if(frac<0.78) return 'Last Quarter';
  return 'Waning Crescent';
}
function moonPhaseEmoji(frac){
  if(frac<0.03 || frac>0.97) return '🌑';
  if(frac<0.22) return '🌒';
  if(frac<0.28) return '🌓';
  if(frac<0.47) return '🌔';
  if(frac<0.53) return '🌕';
  if(frac<0.72) return '🌖';
  if(frac<0.78) return '🌗';
  return '🌘';
}
function getMoonData(date,lat,lon){
  const d=sunMoonDay(date), sun=sunCoords(d), moon=moonCoords(d);
  const ra=r2d(moon.ra), dec=r2d(moon.dec), pos=altAz(ra,dec,date,lat,lon);
  const phaseFrac=norm(r2d(moon.lon - sun.lon))/360;
  const illum=(1-Math.cos(2*Math.PI*phaseFrac))/2;
  return {ra, dec, alt:pos.alt, az:pos.az, illum, phaseFrac, phaseName:moonPhaseName(phaseFrac), phaseEmoji:moonPhaseEmoji(phaseFrac)};
}
const MILKY_WAY_POINTS=[[0,62],[20,58],[40,50],[60,32],[83,-4],[100,-25],[120,-45],[150,-58],[190,-55],[230,-45],[266,-29],[285,-10],[300,8],[320,35],[340,55],[360,62]];
function getMilkyWayData(date,lat,lon){
  const points=MILKY_WAY_POINTS.map(([ra,dec])=>({ra,dec,...altAz(ra,dec,date,lat,lon)}));
  const core=altAz(266.4168,-29.0078,date,lat,lon);
  return {points, coreAlt:core.alt, coreAz:core.az};
}
function drawMoon(){
  const p=place(), t=when(), m=getMoonData(t,p.lat,p.lon);
  if(m.alt<=0) return;
  const xy=project(m.alt,m.az), g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','moon-marker');
  const glow=document.createElementNS('http://www.w3.org/2000/svg','circle');
  glow.setAttribute('class','glow');
  glow.setAttribute('cx',xy.x);
  glow.setAttribute('cy',xy.y);
  glow.setAttribute('r',20);
  glow.setAttribute('fill','#ffd37c');
  g.appendChild(glow);
  const backing=document.createElementNS('http://www.w3.org/2000/svg','circle');
  backing.setAttribute('class','backing');
  backing.setAttribute('cx',xy.x);
  backing.setAttribute('cy',xy.y);
  backing.setAttribute('r',12.5);
  g.appendChild(backing);
  const icon=document.createElementNS('http://www.w3.org/2000/svg','text');
  icon.setAttribute('class','icon');
  icon.setAttribute('x',xy.x);
  icon.setAttribute('y',xy.y+7);
  icon.setAttribute('text-anchor','middle');
  icon.textContent=m.phaseEmoji;
  g.appendChild(icon);
  const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
  tx.setAttribute('x',xy.x+16);
  tx.setAttribute('y',xy.y-12);
  tx.textContent='Moon';
  g.appendChild(tx);
  sky.appendChild(g);
}
function drawMilkyWay(){
  const p=place(), t=when(), mw=getMilkyWayData(t,p.lat,p.lon);
  const visible=mw.points.filter(pt=>pt.alt>0);
  if(visible.length<2) return;
  const d=visible.map((pt,i)=>{ const xy=project(pt.alt,pt.az); return `${i===0?'M':'L'}${xy.x.toFixed(1)} ${xy.y.toFixed(1)}`; }).join(' ');
  const pth=document.createElementNS('http://www.w3.org/2000/svg','path');
  pth.setAttribute('clip-path','url(#discClip)');
  pth.setAttribute('d',d);
  pth.setAttribute('stroke','rgba(230,245,255,.14)');
  pth.setAttribute('stroke-width','48');
  pth.setAttribute('stroke-linecap','round');
  pth.setAttribute('stroke-linejoin','round');
  pth.setAttribute('fill','none');
  pth.setAttribute('filter','url(#glow)');
  sky.appendChild(pth);
}
function renderSkyExtras(){
  const p=place(), t=when();
  const m=getMoonData(t,p.lat,p.lon);
  const mw=getMilkyWayData(t,p.lat,p.lon);
  moonSummary.innerHTML=`<strong>${m.phaseEmoji} Moon patrol:</strong> ${m.phaseName} · ${(m.illum*100).toFixed(0)}% lit · ${m.alt>0?`${m.alt.toFixed(1)}° ${dir(m.az)}`:'below horizon'}<span class="tagline">${moonTagline(m)}</span>`;
  mwSummary.innerHTML=`<strong>Galactic highway:</strong> core ${mw.coreAlt>0?`${mw.coreAlt.toFixed(1)}° ${dir(mw.coreAz)}`:'below horizon'}<span class="tagline">${milkyWayTagline(mw)}</span>`;
}

function project(alt,az){const cx=450,cy=450,R=400,r=(90-Math.max(0,alt))/90*R,a=d2r(az);return {x:cx+r*Math.sin(a),y:cy-r*Math.cos(a)};}
function dir(az){return ['N','NE','E','SE','S','SW','W','NW'][Math.round(norm(az)/45)%8]}
function category(type){if(['Supernova Remnant','Double Star','Asterism','Star Cloud'].includes(type)) return 'Other'; if(['Galaxy'].includes(type)) return 'Galaxy'; if(['Globular'].includes(type)) return 'Globular'; if(['Open'].includes(type)) return 'Open'; if(['Planetary Nebula'].includes(type)) return 'Planetary Nebula'; return 'Diffuse Nebula';}
function cardAsset(type){
  const cat=category(type);
  if(cat==='Galaxy') return 'assets/badge_galaxy.png';
  if(cat==='Globular') return 'assets/badge_globular.png';
  if(cat==='Open') return 'assets/badge_open_cluster.png';
  if(cat==='Planetary Nebula') return 'assets/badge_planetary_nebula.png';
  if(cat==='Diffuse Nebula') return 'assets/badge_diffuse_nebula.png';
  return 'assets/badge_other.png';
}
function missionNoteFor(o){
  const cat=o.cat || category(o.type);
  if(o.alt <= 0) return 'This target is hiding below the horizon. AstroSheep recommends patience.';
  if(cat==='Galaxy') return 'Deep-sky classic. Longer capture sessions make the spiral fluff appear.';
  if(cat==='Globular') return 'Bright, compact, and sheep-approved. A reliable cluster mission.';
  if(cat==='Open') return 'Wide and friendly. Perfect for a relaxed AstroSheeps grazing session.';
  if(cat==='Planetary Nebula') return 'Tiny cosmic donut detected. Precision mission recommended.';
  if(cat==='Diffuse Nebula') return 'Diffuse target. Darker skies help the cosmic fog stand out.';
  return 'Unusual Messier target. AstroSheep says: investigate with curiosity.';
}
function moonTagline(m){
  if(m.illum > .75) return 'Moon patrol is bright tonight — faint fuzzies may struggle.';
  if(m.illum < .15) return 'Dark-sky bonus unlocked. Sheep-approved deep-sky conditions.';
  if(m.alt > 0) return 'Moon is above the horizon. Check faint targets carefully.';
  return 'Moon is off duty from your current sky view.';
}
function milkyWayTagline(mw){
  if(mw.coreAlt > 15) return 'Galactic highway is open. Core visibility looks promising.';
  if(mw.coreAlt > 0) return 'Core is low but present. A clear horizon matters.';
  return 'Galactic core is below the horizon, but the band still updates with time.';
}
function computedObjects(){const p=place(),t=when(); return objects.map(o=>Object.assign({},o,altAz(o.ra,o.dec,t,p.lat,p.lon),{cat:category(o.type)}));}
function computedStars(){const p=place(),t=when(); return stars.map(s=>Object.assign({},s,altAz(s.ra,s.dec,t,p.lat,p.lon)));}
function base(){
  sky.setAttribute('viewBox','0 0 900 900');
  sky.innerHTML=`<defs><filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="8"/></filter><radialGradient id="skyGrad" cx="50%" cy="54%" r="62%"><stop offset="0" stop-color="#0b2b48" stop-opacity=".58"/><stop offset=".72" stop-color="#07172b" stop-opacity=".52"/><stop offset="1" stop-color="#020714" stop-opacity=".42"/></radialGradient><clipPath id="discClip"><circle cx="450" cy="450" r="400"/></clipPath></defs><circle class="outer" cx="450" cy="450" r="400"/><g clip-path="url(#discClip)"><rect x="50" y="50" width="800" height="800" fill="url(#skyGrad)"/><circle class="grid" cx="450" cy="450" r="300"/><circle class="grid" cx="450" cy="450" r="200"/><circle class="grid" cx="450" cy="450" r="100"/><line class="grid" x1="50" y1="450" x2="850" y2="450"/><line class="grid" x1="450" y1="50" x2="450" y2="850"/></g><text class="skylabel" x="450" y="92" text-anchor="middle">N</text><text class="skylabel" x="450" y="834" text-anchor="middle">S</text><text class="skylabel" x="84" y="460" text-anchor="middle">E</text><text class="skylabel" x="816" y="460" text-anchor="middle">W</text><text class="altlabel" x="450" y="155" text-anchor="middle">75°</text><text class="altlabel" x="450" y="255" text-anchor="middle">60°</text><text class="altlabel" x="450" y="355" text-anchor="middle">45°</text><text class="altlabel" x="450" y="455" text-anchor="middle">30°</text><text class="altlabel" x="450" y="555" text-anchor="middle">15°</text>`;
}

function drawStars(){
  const list=computedStars();
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('clip-path','url(#discClip)');
  list.forEach(s=>{
    if(s.alt<=0) return;
    const xy=project(s.alt,s.az);
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('class','star');
    c.setAttribute('cx',xy.x); c.setAttribute('cy',xy.y);
    c.setAttribute('r',Math.max(0.8,3.8-Math.max(-1,s.mag)));
    c.setAttribute('opacity',Math.min(.95,.36+(3.5-s.mag)/5));
    g.appendChild(c);
    if(toggleStarNames.checked && s.mag<1.8){
      const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
      tx.setAttribute('class','star-label');
      tx.setAttribute('x',xy.x+6); tx.setAttribute('y',xy.y-6);
      tx.textContent=s.name; g.appendChild(tx);
    }
  });
  sky.appendChild(g);
}
function drawConstellations(){
  const lineDefs = [
    {name:'Ursa Major', stars:['Dubhe','Merak','Alioth','Mizar','Alkaid'], label:{ra:180,dec:55}},
    {name:'Orion', stars:['Betelgeuse','Bellatrix','Alnilam','Rigel'], label:{ra:83,dec:0}},
    {name:'Cassiopeia', stars:['Caph','Schedar'], label:{ra:10,dec:58}},
    {name:'Summer Triangle', stars:['Deneb','Vega','Altair'], label:{ra:295,dec:31}},
    {name:'Scorpius', stars:['Antares','Sargas','Shaula'], label:{ra:255,dec:-30}}
  ];
  const starMap = Object.fromEntries(computedStars().map(s=>[s.name,s]));
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('clip-path','url(#discClip)');
  if(toggleConstLines.checked){
    lineDefs.forEach(c=>{
      const pts = c.stars.map(n=>starMap[n]).filter(Boolean).filter(s=>s.alt>0).map(s=>project(s.alt,s.az));
      for(let i=0;i<pts.length-1;i++){
        const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
        ln.setAttribute('x1',pts[i].x); ln.setAttribute('y1',pts[i].y);
        ln.setAttribute('x2',pts[i+1].x); ln.setAttribute('y2',pts[i+1].y);
        ln.setAttribute('stroke','rgba(88,230,255,.26)');
        ln.setAttribute('stroke-width','1.2');
        g.appendChild(ln);
      }
    });
  }
  if(toggleConstLabels.checked){
    lineDefs.forEach(c=>{
      const aa=altAz(c.label.ra,c.label.dec,when(),place().lat,place().lon);
      if(aa.alt<=0) return;
      const xy=project(aa.alt,aa.az);
      const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
      tx.setAttribute('class','star-label');
      tx.setAttribute('x',xy.x+6); tx.setAttribute('y',xy.y+4);
      tx.setAttribute('opacity','0.85');
      tx.textContent=c.name;
      g.appendChild(tx);
    });
  }
  sky.appendChild(g);
}
function objectVisibleByFilter(o,min){if(o.alt<=0) return false; if(!toggleDSO.checked) return false; if(!enabledTypes.has(o.cat)) return false; if(displayMode==='onlyAbove' && o.alt<min) return false; return true;}
function drawObjects(list){const min=+minAltEl.value; const gAll=document.createElementNS('http://www.w3.org/2000/svg','g'); gAll.setAttribute('clip-path','url(#discClip)'); let count=0; list.forEach(o=>{if(!objectVisibleByFilter(o,min)) return; count++; const xy=project(o.alt,o.az), color=colors[o.cat]||'#fff', g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class',`marker ${o.id===selected?'selected':''} ${displayMode==='highlight'&&o.alt<min?'below-limit':''}`); g.style.color=color; g.onclick=()=>{selected=o.id; render();}; const glow=document.createElementNS('http://www.w3.org/2000/svg','circle'); glow.setAttribute('class','glow'); glow.setAttribute('cx',xy.x); glow.setAttribute('cy',xy.y); glow.setAttribute('r',displayMode==='highlight'&&o.alt>=min?13:10); glow.setAttribute('fill',color); g.appendChild(glow); const core=document.createElementNS('http://www.w3.org/2000/svg','circle'); core.setAttribute('class','core'); core.setAttribute('cx',xy.x); core.setAttribute('cy',xy.y); core.setAttribute('r',displayMode==='highlight'&&o.alt>=min?6.2:5); core.setAttribute('stroke',color); g.appendChild(core); if(o.id===selected){const h=document.createElementNS('http://www.w3.org/2000/svg','path'); h.setAttribute('class','cross'); h.setAttribute('d',`M${xy.x-9} ${xy.y} H ${xy.x+9} M ${xy.x} ${xy.y-9} V ${xy.y+9}`); g.appendChild(h);} const label=document.createElementNS('http://www.w3.org/2000/svg','text'); label.setAttribute('x',xy.x+10); label.setAttribute('y',xy.y-8); label.textContent=o.id; g.appendChild(label); gAll.appendChild(g); }); sky.appendChild(gAll); if(count===0){const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','no-targets'); t.setAttribute('x',450); t.setAttribute('y',450); t.textContent='No objects match the current filters'; sky.appendChild(t);} }
function panelRender(list){
  const o=selected ? list.find(x=>x.id===selected) : null;
  if(!o){
    panel.innerHTML=`<div class="panel-empty"><div class="kicker">AstroSheeps mission control</div><h3>No target selected</h3><p>AstroSheep is waiting for a new observing mission. Choose a Messier object from the side list or tap a marker on the planisphere.</p></div>`;
    return;
  }
  const min=+minAltEl.value;
  const above=o.alt>=min;
  panel.innerHTML=`<button class="panel-close" id="panelCloseBtn" aria-label="Close">×</button><div class="panel-head"><div><h2>${o.id}</h2><h3>${o.name}</h3><p>${o.constellation} · ${o.type}</p></div><div class="object-img" style="background-image:url('${cardAsset(o.type)}')"></div></div><div class="badges"><span class="badge violet">${o.cat.toUpperCase()}</span><span class="badge mint">● ${above?'ABOVE LIMIT':'BELOW LIMIT'}</span></div><div class="facts"><div class="fact"><span>Altitude</span><strong>${o.alt.toFixed(1)}°</strong></div><div class="fact"><span>Azimuth</span><strong>${o.az.toFixed(1)}° (${dir(o.az)})</strong></div><div class="fact"><span>Coordinates</span><strong>RA ${(o.ra/15).toFixed(2)}h · Dec ${o.dec.toFixed(1)}°</strong></div><div class="fact"><span>Visibility</span><strong>${o.alt>0?'Above horizon':'Below horizon'}</strong></div></div><div class="sheep-note"><img src="assets/logo_sheep.png" alt=""><span><strong>Mission note:</strong> ${missionNoteFor(o)}</span></div>`;
  const closeBtn=document.getElementById('panelCloseBtn');
  if(closeBtn) closeBtn.addEventListener('click',()=>{selected=null; render();});
}
function updateControls(){
  const min=+minAltEl.value;
  minAltLabel.textContent=min;
  minAltEl.style.setProperty('--progress',(min/80*100)+'%');
  document.querySelectorAll('#visibilityFilters .chip').forEach(b=>b.classList.toggle('active',b.dataset.mode===displayMode));
  document.querySelectorAll('#typeFilters button').forEach(b=>b.classList.toggle('off',!enabledTypes.has(b.dataset.type)));
}
function renderCatalog(){
  const search=(catalogSearch.value||'').trim().toLowerCase();
  const list=computedObjects()
    .sort((a,b)=>a.id.localeCompare(b.id,undefined,{numeric:true}))
    .filter(o=>o.search.includes(search));
  catalogList.innerHTML=list.map(o=>`<div class="catalog-item" data-id="${o.id}"><h4>${o.id} — ${o.name}</h4><div class="catalog-meta"><span class="pill">${o.cat}</span><span>${o.constellation}</span></div><div class="catalog-alt">Alt ${o.alt.toFixed(1)}° · Az ${o.az.toFixed(1)}° · ${o.alt>0?'Visible':'Below horizon'}</div></div>`).join('');
  catalogList.querySelectorAll('.catalog-item').forEach(el=>el.addEventListener('click',()=>{
    selected=el.dataset.id;
    catalogModal.classList.remove('open');
    render();
  }));
}

function renderVisibleMessierTable(list){
  const min=+minAltEl.value;
  const visible = list
    .filter(o => o.alt > 0)
    .filter(o => o.alt >= min)
    .filter(o => enabledTypes.has(o.cat))
    .sort((a,b)=>b.alt-a.alt || a.id.localeCompare(b.id, undefined, {numeric:true}));
  visibleMessierCount.textContent = `${visible.length} visible`;
  if(!visible.length){
    visibleMessierBody.innerHTML = '<tr><td colspan="4" class="empty">No sheep-approved targets for the current filters. Try lowering Min Altitude or enabling more object types.</td></tr>';
    return;
  }
  visibleMessierBody.innerHTML = visible.map(o => `<tr data-id="${o.id}" class="${o.id===selected?'active':''}"><td>${o.id}</td><td>${o.name}</td><td>${dir(o.az)}</td><td>${o.alt.toFixed(1)}°</td></tr>`).join('');
  visibleMessierBody.querySelectorAll('tr[data-id]').forEach(row => row.addEventListener('click', ()=>{
    selected = row.dataset.id;
    render();
  }));
}

function render(){
  updateControls();
  base();
  drawMilkyWay();
  drawStars();
  drawMoon();
  drawConstellations();
  const list=computedObjects();
  const hasSelection = !!(selected && list.find(x=>x.id===selected));
  document.body.classList.toggle('has-selection', hasSelection);
  document.body.classList.toggle('no-selection', !hasSelection);
  drawObjects(list);
  panelRender(list);
  renderVisibleMessierTable(list);
  renderSkyExtras();
  renderCatalog();
}

document.getElementById('catalogBtn').addEventListener('click',()=>{catalogModal.classList.add('open'); renderCatalog();});
document.getElementById('catalogClose').addEventListener('click',()=>catalogModal.classList.remove('open')); messierCatalogBtn.addEventListener('click',()=>{catalogModal.classList.add('open'); renderCatalog();});
catalogModal.addEventListener('click',e=>{if(e.target===catalogModal) catalogModal.classList.remove('open');});
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{activeTab=btn.dataset.tab; document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===btn)); catalogSearch.value=''; renderCatalog();}));
catalogSearch.addEventListener('input',renderCatalog);
function shiftDateTime(direction){
  const step=stepEl.value;
  const d=when();
  if(step==='minute') d.setMinutes(d.getMinutes()+direction);
  else if(step==='hour') d.setHours(d.getHours()+direction);
  else d.setDate(d.getDate()+direction);
  dtEl.value=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
prevStepBtn.addEventListener('click',()=>{shiftDateTime(-1); render();});
nextStepBtn.addEventListener('click',()=>{shiftDateTime(1); render();});
nowBtn.addEventListener('click',()=>{const d=new Date(); dtEl.value=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`; render();});
useLocationBtn.addEventListener('click',()=>{
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos=>{
    latEl.value=pos.coords.latitude.toFixed(4);
    lonEl.value=pos.coords.longitude.toFixed(4);
    render();
  });
});
document.querySelectorAll('#visibilityFilters .chip').forEach(btn=>btn.addEventListener('click',()=>{displayMode=btn.dataset.mode; render();}));
document.querySelectorAll('#typeFilters button').forEach(btn=>btn.addEventListener('click',()=>{const t=btn.dataset.type; if(enabledTypes.has(t)) enabledTypes.delete(t); else enabledTypes.add(t); render();}));
[dtEl,latEl,lonEl,minAltEl,toggleDSO,toggleStarNames,toggleConstLines,toggleConstLabels].forEach(el=>el.addEventListener('input',render));
init(); render();
</script>
